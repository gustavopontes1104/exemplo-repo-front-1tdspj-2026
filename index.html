<!DOCTYPE html>
<!-- DTD é o document type definition e informa para o navegador a versão do html que está sendo carregada. Assim o navegador pode carregar um conjunto de bibliotecas de acordo com a versão específica. -->
<!-- ATRIBUTOS: os atributos são do tipo chave = valor. Ex: lang="pt-BR", isso é um atributo que pode ir em qualquer tag de conteúdo. <html lang="pt-BR"> ... </html>
-->

<html lang="pt-br">
</html>
